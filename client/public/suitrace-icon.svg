<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <title>SuiTrace icon</title>

  <rect width="200" height="200" fill="#0D0D0D"/>

  <!-- Chain link left -->
  <rect x="8" y="90" width="30" height="18" rx="9" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <!-- Chain link right -->
  <rect x="162" y="90" width="30" height="18" rx="9" fill="none" stroke="#1D9E75" stroke-width="2"/>

  <!-- Connector lines -->
  <line x1="38" y1="99" x2="58" y2="99" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="142" y1="99" x2="162" y2="99" stroke="#1D9E75" stroke-width="1.5"/>

  <!-- Central circle -->
  <circle cx="100" cy="99" r="42" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <!-- Dashed inner ring -->
  <circle cx="100" cy="99" r="28" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Core dot -->
  <circle cx="100" cy="99" r="7" fill="#1D9E75"/>

  <!-- Satellite nodes -->
  <circle cx="100" cy="61" r="5" fill="#7F77DD"/>
  <circle cx="133" cy="80" r="5" fill="#7F77DD"/>
  <circle cx="133" cy="118" r="5" fill="#7F77DD"/>
  <circle cx="100" cy="137" r="5" fill="#7F77DD"/>
  <circle cx="67" cy="118" r="5" fill="#7F77DD"/>
  <circle cx="67" cy="80" r="5" fill="#7F77DD"/>

  <!-- Spokes -->
  <line x1="100" y1="92" x2="100" y2="66" stroke="#7F77DD" stroke-width="1" opacity="0.7"/>
  <line x1="106" y1="95" x2="128" y2="83" stroke="#7F77DD" stroke-width="1" opacity="0.7"/>
  <line x1="106" y1="103" x2="128" y2="115" stroke="#7F77DD" stroke-width="1" opacity="0.7"/>
  <line x1="100" y1="106" x2="100" y2="132" stroke="#7F77DD" stroke-width="1" opacity="0.7"/>
  <line x1="94" y1="103" x2="72" y2="115" stroke="#7F77DD" stroke-width="1" opacity="0.7"/>
  <line x1="94" y1="95" x2="72" y2="83" stroke="#7F77DD" stroke-width="1" opacity="0.7"/>

  <!-- Verified badge -->
  <circle cx="134" cy="128" r="11" fill="#0D0D0D" stroke="#1D9E75" stroke-width="1.5"/>
  <polyline points="129,128 133,132 140,122" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
